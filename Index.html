<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Beranda - Cashnote App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container utama beranda */
        .beranda-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 24px 20px 32px 20px;
            transition: all 0.2s ease;
        }

        /* Bagian pencarian */
        .search-section {
            margin-bottom: 28px;
        }
        .search-wrapper {
            display: flex;
            align-items: center;
            background: #f1f3f7;
            border-radius: 60px;
            padding: 6px 16px;
            border: 1px solid #e2e6ec;
            transition: all 0.2s;
        }
        .search-wrapper:focus-within {
            background: white;
            border-color: #b886ff;
            box-shadow: 0 0 0 3px rgba(184,134,255,0.2);
        }
        .search-icon {
            font-size: 20px;
            color: #6c7a91;
            margin-right: 10px;
        }
        #searchInput {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 0;
            font-size: 16px;
            outline: none;
            color: #1a2634;
        }
        #searchInput::placeholder {
            color: #9aa9bb;
            font-weight: 400;
        }

        /* Grid file cashnote */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
            margin: 20px 0 30px;
        }

        /* Kartu file */
        .file-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            border: 1px solid #eef2f8;
            transition: all 0.2s ease;
            cursor: pointer;
            overflow: hidden;
        }
        .file-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 24px -8px rgba(0,0,0,0.12);
            border-color: #d9e0eb;
        }
        .file-preview {
            background: #fafcff;
            padding: 20px 18px 12px 18px;
            border-bottom: 1px solid #f0f2f6;
        }
        .file-name {
            font-weight: 600;
            font-size: 1.2rem;
            color: #1e2a3e;
            word-break: break-word;
            background: transparent;
            border: none;
            width: 100%;
            padding: 6px 0;
            outline: none;
            border-radius: 12px;
            transition: background 0.1s;
        }
        .file-name:focus {
            background: #f0f4fe;
            padding-left: 8px;
        }
        .file-meta {
            font-size: 12px;
            color: #7e8b9f;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
        }
        .file-actions {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            padding: 12px 18px;
            background: #ffffff;
            border-top: 1px solid #f0f2f6;
        }
        .action-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.15s;
            color: #4b5b73;
        }
        .action-btn.delete-btn {
            color: #d9536c;
        }
        .action-btn.delete-btn:hover {
            background: #ffe8ec;
            color: #b52b46;
        }
        .action-btn.share-btn {
            color: #2c7da0;
        }
        .action-btn.share-btn:hover {
            background: #e6f4ff;
            color: #0f5b7a;
        }
        .empty-message {
            text-align: center;
            padding: 48px 20px;
            background: #fafbfe;
            border-radius: 32px;
            color: #8d9bb0;
            margin: 20px 0;
        }

        /* Tombol + (FAB) */
        .fab-add {
            position: sticky;
            bottom: 20px;
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }
        .btn-add {
            background: #8b5cf6;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 500;
            color: white;
            border: none;
            box-shadow: 0 8px 18px rgba(139,92,246,0.4);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-add:hover {
            background: #7c3aed;
            transform: scale(1.02);
        }

        /* notifikasi sederhana */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        hr {
            margin: 8px 0;
        }
    </style>
</head>
<body>
<div class="beranda-container">
    <!-- fitur pencarian -->
    <div class="search-section">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Cari cashnote berdasarkan nama file ..." autocomplete="off">
        </div>
    </div>

    <!-- grid file cashnote -->
    <div id="filesGridContainer" class="files-grid">
        <!-- file cards akan diisi oleh javascript -->
    </div>

    <!-- tombol + di pojok kanan bawah -->
    <div class="fab-add">
        <button class="btn-add" id="addFileBtn" aria-label="Tambah Cashnote">+</button>
    </div>
</div>
<div id="toastMessage" class="toast-msg"></div>

<script>
    // Data structure untuk menyimpan semua cashnote
    let allCashnotes = JSON.parse(localStorage.getItem("allCashnotes")) || [];
    let cashnoteFiles = [];
    let nextId = 1;

    // Fungsi untuk memuat data dari localStorage atau menggunakan data default
    function loadCashnoteData() {
        if (allCashnotes.length > 0) {
            // Konversi data dari allCashnotes ke format cashnoteFiles
            cashnoteFiles = allCashnotes.map(item => ({
                id: item.id,
                name: item.name,
                createdAt: item.createdAt
            }));
            // Update nextId berdasarkan id terakhir
            const maxId = Math.max(...cashnoteFiles.map(f => parseInt(f.id.split('_')[1]) || 0), 0);
            nextId = maxId + 1;
        } else {
            // Data default jika belum ada
            cashnoteFiles = [
                { id: "file_1", name: "Laporan Maret 2025", createdAt: "2025-03-01" },
                { id: "file_2", name: "Cashflow Toko A", createdAt: "2025-03-15" },
                { id: "file_3", name: "Invoice April", createdAt: "2025-04-01" }
            ];
            nextId = 4;
            // Simpan ke localStorage
            saveAllCashnotes();
        }
    }

    // Fungsi menyimpan semua cashnote ke localStorage
    function saveAllCashnotes() {
        allCashnotes = cashnoteFiles.map(file => {
            // Cari data spreadsheet yang sudah ada
            const existing = allCashnotes.find(c => c.id === file.id);
            return {
                id: file.id,
                name: file.name,
                createdAt: file.createdAt,
                updatedAt: file.updatedAt || file.createdAt,
                spreadsheetData: existing?.spreadsheetData || {
                    sheets: [{}],
                    currentSheet: 0,
                    rows: 50,
                    cols: 10
                }
            };
        });
        localStorage.setItem("allCashnotes", JSON.stringify(allCashnotes));
    }

    // Fungsi untuk render grid berdasarkan keyword pencarian
    function renderGrid(searchTerm = "") {
        const container = document.getElementById("filesGridContainer");
        if (!container) return;
        
        const term = searchTerm.trim().toLowerCase();
        let filteredFiles = cashnoteFiles;
        if (term !== "") {
            filteredFiles = cashnoteFiles.filter(file => file.name.toLowerCase().includes(term));
        }

        if (filteredFiles.length === 0) {
            container.innerHTML = `<div class="empty-message">📂 Tidak ada cashnote. Tekan tombol + untuk membuat baru.</div>`;
            return;
        }

        container.innerHTML = filteredFiles.map(file => `
            <div class="file-card" data-file-id="${file.id}">
                <div class="file-preview" data-clickable="card">
                    <input type="text" class="file-name" value="${escapeHtml(file.name)}" data-file-id="${file.id}" data-field="name">
                    <div class="file-meta">
                        <span>📄 ${file.createdAt || "Baru"}</span>
                    </div>
                </div>
                <div class="file-actions">
                    <button class="action-btn delete-btn" data-action="delete" data-id="${file.id}">🗑️ Hapus</button>
                    <button class="action-btn share-btn" data-action="share" data-id="${file.id}">📤 Bagikan</button>
                </div>
            </div>
        `).join("");

        // Event listener untuk klik pada area file-card (kecuali tombol aksi / input)
        document.querySelectorAll(".file-card").forEach(card => {
            const cardId = card.getAttribute("data-file-id");
            // Klik pada background card / preview -> navigasi ke halaman berikutnya
            const previewDiv = card.querySelector(".file-preview");
            if (previewDiv) {
                previewDiv.addEventListener("click", (e) => {
                    if (e.target.classList && e.target.classList.contains("file-name")) return;
                    if (e.target.closest(".file-actions")) return;
                    // PINDAH KE HALAMAN halmembuatfile.html
                    showNextPage(cardId);
                });
            }

            // Input untuk mengubah nama file
            const nameInput = card.querySelector(".file-name");
            if (nameInput) {
                nameInput.addEventListener("change", (e) => {
                    e.stopPropagation();
                    const newName = e.target.value.trim();
                    const fileId = nameInput.getAttribute("data-file-id");
                    if (newName === "") {
                        showToast("Nama file tidak boleh kosong");
                        const original = cashnoteFiles.find(f => f.id === fileId)?.name || "Untitled";
                        e.target.value = original;
                        return;
                    }
                    const fileIndex = cashnoteFiles.findIndex(f => f.id === fileId);
                    if (fileIndex !== -1) {
                        cashnoteFiles[fileIndex].name = newName;
                        saveAllCashnotes();
                        showToast("Nama file diperbarui");
                        renderGrid(document.getElementById("searchInput").value);
                    }
                });
            }
        });

        // Pasang event untuk tombol hapus & bagikan
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.removeEventListener("click", handleDelete);
            btn.addEventListener("click", handleDelete);
        });
        document.querySelectorAll(".share-btn").forEach(btn => {
            btn.removeEventListener("click", handleShare);
            btn.addEventListener("click", handleShare);
        });
    }

    function handleDelete(e) {
        e.stopPropagation();
        const btn = e.currentTarget;
        const fileId = btn.getAttribute("data-id");
        if (!fileId) return;
        const confirmDelete = confirm("Hapus file cashnote ini?");
        if (confirmDelete) {
            cashnoteFiles = cashnoteFiles.filter(f => f.id !== fileId);
            saveAllCashnotes();
            renderGrid(document.getElementById("searchInput").value);
            showToast("File terhapus");
        }
    }

    function handleShare(e) {
        e.stopPropagation();
        const btn = e.currentTarget;
        const fileId = btn.getAttribute("data-id");
        const file = cashnoteFiles.find(f => f.id === fileId);
        if (file) {
            if (navigator.share) {
                navigator.share({
                    title: 'Cashnote',
                    text: `Bagikan cashnote: ${file.name}`,
                    url: window.location.href + `?share=${file.id}`,
                }).catch(err => {
                    if (err.name !== 'AbortError') showToast("Gagal membagikan");
                });
            } else {
                showToast(`📱 Salin tautan: Cashnote "${file.name}"`);
                navigator.clipboard.writeText(`Cashnote: ${file.name} - ${new Date().toLocaleString()}`);
                showToast("Nama cashnote disalin ke clipboard");
            }
        }
    }

    // Tombol + : membuat file baru
    function onAddNewFile() {
        const newId = `file_${nextId++}`;
        const newFileName = `Cashnote Baru ${new Date().toLocaleDateString()}`;
        const newFile = {
            id: newId,
            name: newFileName,
            createdAt: new Date().toISOString().slice(0,10)
        };
        cashnoteFiles.unshift(newFile);
        saveAllCashnotes();
        renderGrid(document.getElementById("searchInput").value);
        showToast("File cashnote baru ditambahkan. Klik untuk masuk ke editor.");
    }

    // PINDAH KE HALAMAN halmembuatfile.html
    function showNextPage(fileId) {
        const file = cashnoteFiles.find(f => f.id === fileId);
        if (!file) return;
        
        // Simpan data file ke localStorage agar bisa dibaca di halmembuatfile.html
        localStorage.setItem("activeCashnoteId", fileId);
        localStorage.setItem("activeCashnoteName", file.name);
        localStorage.setItem("activeCashnoteDate", file.createdAt);
        
        // Redirect ke halaman editor
        window.location.href = "halmembuatfile.html";
    }

    // Pencarian realtime
    const searchInput = document.getElementById("searchInput");
    if (searchInput) {
        searchInput.addEventListener("input", (e) => {
            renderGrid(e.target.value);
        });
    }

    // Tombol tambah
    const addBtn = document.getElementById("addFileBtn");
    if (addBtn) {
        addBtn.addEventListener("click", onAddNewFile);
    }

    // Helper escape html
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(msg) {
        const toast = document.getElementById("toastMessage");
        if (!toast) return;
        toast.textContent = msg;
        toast.style.opacity = "1";
        setTimeout(() => {
            toast.style.opacity = "0";
        }, 2000);
    }

    // Inisialisasi data dan render
    loadCashnoteData();
    renderGrid("");
</script>
</body>
</html>
